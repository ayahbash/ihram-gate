<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - IhramGate</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="form-container">
        <div class="form-card" style="max-width: 800px;">
            <div class="logo" style="text-align: center; margin-bottom: 1rem;">Ihram<span>Gate</span></div>
            <h1 style="text-align: center;">Create Account</h1>
            <p class="subtitle" style="text-align: center;">Register for Hajj lottery</p>

            <div class="notice" style="background: #fff8e6; padding: 0.85rem 1rem; border-radius: 8px; margin-bottom: 1.75rem;">
                ⚠️ Account requires admin approval after registration
            </div>

            <form>
                <!-- personal information -->
                <div class="form-section">
                    <h3>Personal Information</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" placeholder="Aya Serine" required>
                        </div>
                        <div class="form-group">
                            <label>National ID (NIN)</label>
                            <input type="text" placeholder="00000000000000000000" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Date of Birth</label>
                            <input type="date" required>
                        </div>
                        <div class="form-group">
                            <label>Place of Birth</label>
                            <input type="text" placeholder="Boumerdes">
                        </div>
                    </div>
                </div>

                <!-- family information -->
                <div class="form-section">
                    <h3>Family Information</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Father's Name</label>
                            <input type="text" placeholder="Mohamed" required>
                        </div>
                        <div class="form-group">
                            <label>Mother's Full Name</label>
                            <input type="text" placeholder="El Dar" required>
                        </div>
                    </div>
                </div>

                <!-- address -->
                <div class="form-section">
                    <h3>Address</h3>
                    <div class="form-group">
                        <label>Street Address</label>
                        <input type="text" placeholder="Boumerdes" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Wilaya (Province)</label>
                            <select>
                                <option>Algiers</option>
                                <option>Boumerdes</option>
                                <option>Oran</option>
                                <option>Constantine</option>
                                <option>Annaba</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Commune</label>
                            <input type="text" placeholder="USTHB">
                        </div>
                    </div>
                </div>

                <!-- contact -->
                <div class="form-section">
                    <h3>Contact Information</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" placeholder="ayaserine@email.com" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" placeholder="05XX XX XX XX" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" placeholder="Create a password" required>
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" placeholder="Confirm password" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Register Account</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <p style="font-size: 0.9rem; color: #666;">Already have an account? <a href="login.html" style="color: #1B5B4A; font-weight: 600;">Sign in</a></p>
            </div>
        </div>
    </div>

</body>
</html>
