<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IhramGate</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="form-container">
        <div class="form-card">
            <div class="logo" style="text-align: center; margin-bottom: 1rem;">Ihram<span>Gate</span></div>
            <h1 style="text-align: center;">Welcome Back</h1>
            <p class="subtitle" style="text-align: center;">Login to your account</p>

            <form>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <p style="font-size: 0.9rem; color: #666;">Don't have an account? <a href="signup.html" style="color: #1B5B4A; font-weight: 600;">Sign up</a></p>
            </div>
        </div>
    </div>

</body>
</html>
